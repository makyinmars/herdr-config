onboarding = false
[theme]
name = "gruvbox"

[theme.custom]
accent = "#d79921"
panel_bg = "#1d2021"
surface0 = "#282828"
surface1 = "#3c3836"
surface_dim = "#1d2021"
overlay0 = "#928374"
overlay1 = "#a89984"
text = "#ebdbb2"
subtext0 = "#d5c4a1"
mauve = "#d3869b"
green = "#b8bb26"
yellow = "#fabd2f"
red = "#fb4934"
blue = "#83a598"
teal = "#8ec07c"
peach = "#fe8019"

[ui]
agent_panel_scope = "all"
accent = "#d79921"

[keys]
# Ctrl+L is the Herdr leader/prefix.
prefix = "ctrl+l"

# tmux-style pane and session controls.
split_vertical = "prefix+%"
split_horizontal = 'prefix+"'
detach = "prefix+d"

# Use prefix+s for spaces/workspaces and keep settings on prefix+S.
workspace_picker = "prefix+s"
settings = "prefix+shift+s"

# Vim-style navigation.
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
navigate_workspace_up = "k"
navigate_workspace_down = "j"
navigate_pane_left = "h"
navigate_pane_down = ""
navigate_pane_up = ""
navigate_pane_right = "l"

# Cycle through agents from the prefix.
next_agent = "prefix+."
previous_agent = "prefix+,"

[experimental]
pane_history = true
switch_ascii_input_source_in_prefix = false

[[keys.command]] # open in a split beside your work
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"

[[keys.command]] # …or in its own tab
key = "prefix+shift+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer-tab --plugin herdr-file-viewer"
